<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard UI Test</title>
<script>
// Minimal DOM state test - verifies the dashboard structure is correct
function runTests() {
  const results = [];
  const pass = (name) => results.push({ name, status: 'PASS' });
  const fail = (name, msg) => results.push({ name, status: 'FAIL', msg });

  // Test 1: Sidebar has toggle button
  const toggle = document.querySelector('[data-testid="sidebar-toggle"]');
  toggle ? pass('Sidebar toggle exists') : fail('Sidebar toggle exists', 'not found');

  // Test 2: Sidebar collapses on click
  if (toggle) {
    toggle.click();
    const sidebar = document.querySelector('[data-testid="sidebar"]');
    sidebar.classList.contains('collapsed')
      ? pass('Sidebar collapses on toggle click')
      : fail('Sidebar collapses on toggle click', 'class not applied');
  }

  // Test 3: Screenshot viewer has object-fit
  const viewer = document.querySelector('[data-testid="screenshot-viewer"]');
  if (viewer) {
    const img = viewer.querySelector('img');
    img ? pass('Screenshot image exists') : fail('Screenshot image exists', 'no img');
    const style = window.getComputedStyle(viewer);
    style.maxHeight !== 'none'
      ? pass('Screenshot viewer has max-height')
      : fail('Screenshot viewer has max-height', 'no max-height');
  }

  // Test 4: Panels have collapse toggle buttons
  const panelToggles = document.querySelectorAll('[data-testid="panel-toggle"]');
  panelToggles.length >= 3
    ? pass(`Panels have toggle buttons: ${panelToggles.length}`)
    : fail('Panels have toggle buttons', `expected >= 3, got ${panelToggles.length}`);

  // Test 5: Panel body collapses/expands
  if (panelToggles.length > 0) {
    const firstToggle = panelToggles[0];
    const panelBody = firstToggle.closest('.panel').querySelector('.panel-body');
    firstToggle.click();
    panelBody.style.display === 'none'
      ? pass('Panel body collapses')
      : fail('Panel body collapses', 'still visible');
    firstToggle.click();
    panelBody.style.display !== 'none'
      ? pass('Panel body expands')
      : fail('Panel body expands', 'still hidden');
  }

  // Test 6: Scrollable content areas have overflow
  const scrollables = document.querySelectorAll('[data-testid="timeline-body"], [data-testid="browser-body"]');
  let scrollOk = true;
  scrollables.forEach(el => {
    const style = window.getComputedStyle(el);
    if (style.overflowY !== 'auto' && style.overflowY !== 'scroll') scrollOk = false;
  });
  scrollOk
    ? pass('Scrollable sections have overflow-y')
    : fail('Scrollable sections have overflow-y', 'missing overflow');

  // Output results
  const out = document.getElementById('test-results');
  out.innerHTML = results.map(r =>
    `<div style="color:${r.status==='PASS'?'green':'red'}">[${r.status}] ${r.name}${r.msg ? ' — '+r.msg : ''}</div>`
  ).join('');
  const total = results.length;
  const passed = results.filter(r => r.status === 'PASS').length;
  out.innerHTML += `<hr><strong>${passed}/${total} passed</strong>`;
}
</script>
</head>
<body onload="runTests()">
  <h2>Dashboard UI Test Results</h2>
  <div id="test-results">Running...</div>
  <iframe id="dashboard" src="about:blank" style="width:100%;height:800px;display:none"></iframe>
</body>
</html>
