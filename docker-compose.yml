# ============================================
# Monitor Server - Docker Compose
# ============================================
version: "3.8"

services:
  monitor-server:
    build: .
    container_name: monitor-server
    restart: unless-stopped
    ports:
      - "8899:8899"
    volumes:
      # 持久化数据 (截图 + 数据库)
      - ./server/data:/app/server/data
    environment:
      - TZ=Asia/Shanghai
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8899
      # 可选: 数据保留天数
      - MAX_SCREENSHOT_AGE_DAYS=7
      - MAX_HISTORY_DAYS=30
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
