# ============================================
# Monitor Server - Docker Compose
# 在 server/ 目录下运行: docker compose up -d
# ============================================
services:
  monitor-server:
    build: .
    container_name: monitor-server
    restart: unless-stopped
    ports:
      - "8899:8899"
      - "14325:8899"
    volumes:
      # 持久化数据 (截图 + 数据库)
      - ./data:/app/data
      # Agent 多版本发布包，不随 Server 镜像重建而丢失
      - ../releases/agent:/app/releases/agent
    environment:
      - TZ=Asia/Shanghai
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8899
      - AGENT_API_PORT=8899
      - WEB_PUBLIC_PORT=14325
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
