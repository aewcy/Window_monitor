<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>监控面板 - Monitor Dashboard</title>
<style>
  :root {
    --bg: #0f1119;
    --panel: #1a1d2e;
    --border: #2a2d3e;
    --text: #e0e0e0;
    --text-muted: #8890a0;
    --accent: #4f8cff;
    --accent2: #22c55e;
    --warn: #f59e0b;
    --danger: #ef4444;
    --radius: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ========== Header ========== */
  .header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: .02em;
  }
  .header .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; margin-right: 6px;
  }
  .header .status-dot.online { background: var(--accent2); }
  .header .status-dot.offline { background: var(--text-muted); }

  /* ========== Layout ========== */
  .main-grid {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 16px;
    padding: 16px 24px;
    height: calc(100vh - 60px);
  }

  /* ========== Sidebar ========== */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }
  .sidebar .stats {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .sidebar .stats h3 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .stat-item {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 0.9rem;
  }
  .stat-item .val { font-weight: 600; color: var(--accent); }

  .agent-list {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    flex: 1;
  }
  .agent-list h3 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .agent-card {
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all .15s;
  }
  .agent-card:hover { border-color: var(--accent); }
  .agent-card.active { border-color: var(--accent); background: rgba(79,140,255,.08); }
  .agent-card .name { font-weight: 600; font-size: 0.95rem; }
  .agent-card .meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }

  /* ========== Main Content ========== */
  .content {
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,.02);
  }
  .panel-header h3 {
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: .03em;
  }
  .panel-body { padding: 16px; }

  /* ========== Screenshot ========== */
  .screenshot-viewer {
    display: flex;
    justify-content: center;
    background: #000;
    border-radius: 4px;
    overflow: hidden;
    min-height: 300px;
    align-items: center;
  }
  .screenshot-viewer img {
    max-width: 100%;
    max-height: 60vh;
    object-fit: contain;
  }
  .screenshot-viewer .no-data {
    color: var(--text-muted);
    font-size: 0.9rem;
  }
  .screenshot-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  /* ========== Tables ========== */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  th {
    text-align: left;
    padding: 8px 12px;
    color: var(--text-muted);
    font-weight: 500;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: .05em;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(255,255,255,.04);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 300px;
  }
  tr:hover td { background: rgba(255,255,255,.02); }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.7rem;
    font-weight: 600;
  }
  .tag-chrome { background: #4285f422; color: #4285f4; }
  .tag-edge { background: #22c55e22; color: #22c55e; }
  .tag-firefox { background: #ff950022; color: #ff9500; }

  /* ========== Scrollbar ========== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ========== Refresh ========== */
  .refresh-bar {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 0.8rem;
    transition: all .15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .auto-refresh { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--text-muted); }

  @media (max-width: 768px) {
    .main-grid { grid-template-columns: 1fr; }
    .sidebar { order: 2; }
    .content { order: 1; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🖥 监控面板</h1>
  <div class="refresh-bar">
    <label class="auto-refresh">
      <input type="checkbox" id="autoRefresh" checked> 自动刷新
    </label>
    <span id="refreshCountdown" style="font-size:0.75rem;color:var(--text-muted)"></span>
    <button class="btn" onclick="refreshAll()">⟳ 刷新</button>
  </div>
</div>

<div class="main-grid">

  <!-- ===== Sidebar: Stats + Agent List ===== -->
  <div class="sidebar">
    <div class="stats" id="statsPanel">
      <h3>📊 统计</h3>
      <div id="statsContent">加载中...</div>
    </div>

    <div class="agent-list" id="agentListPanel">
      <h3>🖥 终端列表</h3>
      <div id="agentList">加载中...</div>
    </div>
  </div>

  <!-- ===== Main: Screenshot + Tables ===== -->
  <div class="content">

    <!-- 截图面板 -->
    <div class="panel" id="screenshotPanel">
      <div class="panel-header">
        <h3>📸 最新截图 <span id="screenshotAgentLabel" style="color:var(--accent)"></span></h3>
      </div>
      <div class="panel-body">
        <div class="screenshot-viewer" id="screenshotViewer">
          <span class="no-data">请从左侧选择终端</span>
        </div>
        <div class="screenshot-info">
          <span id="screenshotTime"></span>
          <button class="btn" id="btnPrevScreenshot" onclick="prevScreenshot()" disabled>◀ 上一张</button>
        </div>
      </div>
    </div>

    <!-- 应用使用面板 -->
    <div class="panel" id="appUsagePanel">
      <div class="panel-header">
        <h3>📱 应用使用统计</h3>
      </div>
      <div class="panel-body">
        <table>
          <thead><tr><th>进程</th><th>总时长(分钟)</th><th>切换次数</th><th>最近窗口</th></tr></thead>
          <tbody id="appUsageBody"><tr><td colspan="4" style="text-align:center;color:var(--text-muted)">请选择终端</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- 浏览器历史面板 -->
    <div class="panel" id="browserPanel">
      <div class="panel-header">
        <h3>🌐 浏览器访问记录</h3>
      </div>
      <div class="panel-body">
        <table>
          <thead><tr><th>浏览器</th><th>标题</th><th>URL</th><th>访问时间</th><th>次数</th></tr></thead>
          <tbody id="browserBody"><tr><td colspan="5" style="text-align:center;color:var(--text-muted)">请选择终端</td></tr></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
// ============ State ============
let selectedAgent = null;
let currentScreenshotIndex = 0;
let screenshotList = [];
let refreshTimer = null;

// ============ Init ============
document.addEventListener('DOMContentLoaded', () => {
  refreshAll();
  startAutoRefresh();
  document.getElementById('autoRefresh').addEventListener('change', startAutoRefresh);
});

// ============ Auto Refresh ============
function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  if (document.getElementById('autoRefresh').checked) {
    let countdown = 10;
    const cdEl = document.getElementById('refreshCountdown');
    refreshTimer = setInterval(() => {
      countdown--;
      cdEl.textContent = `${countdown}s`;
      if (countdown <= 0) {
        refreshAll();
        countdown = 10;
      }
    }, 1000);
  } else {
    document.getElementById('refreshCountdown').textContent = '';
  }
}

// ============ API Calls ============
async function api(path) {
  const resp = await fetch(path);
  if (!resp.ok) throw new Error(`${resp.status}`);
  return resp.json();
}

// ============ Refresh All ============
async function refreshAll() {
  await loadStats();
  await loadAgents();
  if (selectedAgent) {
    await loadScreenshots(selectedAgent);
    await loadAppUsage(selectedAgent);
    await loadBrowserHistory(selectedAgent);
  }
}

// ============ Stats ============
async function loadStats() {
  try {
    const data = await api('/api/dashboard/stats');
    document.getElementById('statsContent').innerHTML = `
      <div class="stat-item"><span>在线终端</span><span class="val">${data.online_agents ?? 0}</span></div>
      <div class="stat-item"><span>截图总数</span><span class="val">${data.total_screenshots ?? 0}</span></div>
      <div class="stat-item"><span>今日应用事件</span><span class="val">${data.today_app_events ?? 0}</span></div>
      <div class="stat-item"><span>浏览器记录</span><span class="val">${data.total_browser_records ?? 0}</span></div>
    `;
  } catch(e) { console.error('loadStats', e); }
}

// ============ Agent List ============
async function loadAgents() {
  try {
    const agents = await api('/api/agents');
    const list = document.getElementById('agentList');
    if (!agents.length) {
      list.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem">暂无连接的终端</div>';
      return;
    }
    list.innerHTML = agents.map(a => {
      const dotClass = a.status === 'online' ? 'online' : 'offline';
      const activeClass = selectedAgent === a.name ? 'active' : '';
      const lastSeen = a.last_seen || '-';
      return `
        <div class="agent-card ${activeClass}" onclick="selectAgent('${escapeHtml(a.name)}')">
          <div class="name">
            <span class="status-dot ${dotClass}"></span>${escapeHtml(a.name)}
          </div>
          <div class="meta">状态: ${a.status} | 最后心跳: ${lastSeen}</div>
        </div>`;
    }).join('');
  } catch(e) { console.error('loadAgents', e); }
}

// ============ Select Agent ============
async function selectAgent(name) {
  selectedAgent = name;
  document.getElementById('screenshotAgentLabel').textContent = ' - ' + name;
  currentScreenshotIndex = 0;
  screenshotList = [];
  // Update card styles
  document.querySelectorAll('.agent-card').forEach(c => {
    c.classList.toggle('active', c.querySelector('.name').textContent.trim() === name);
  });
  await Promise.all([
    loadScreenshots(name),
    loadAppUsage(name),
    loadBrowserHistory(name),
  ]);
}

// ============ Screenshots ============
async function loadScreenshots(agent) {
  try {
    const data = await api(`/api/screenshots?agent=${encodeURIComponent(agent)}&limit=50`);
    screenshotList = data;
    currentScreenshotIndex = 0;
    displayScreenshot();
    document.getElementById('btnPrevScreenshot').disabled = data.length <= 1;
  } catch(e) {
    console.error('loadScreenshots', e);
    document.getElementById('screenshotViewer').innerHTML = '<span class="no-data">加载失败</span>';
  }
}

function displayScreenshot() {
  const viewer = document.getElementById('screenshotViewer');
  const timeEl = document.getElementById('screenshotTime');
  if (!screenshotList.length) {
    viewer.innerHTML = '<span class="no-data">暂无截图</span>';
    timeEl.textContent = '';
    return;
  }
  const item = screenshotList[currentScreenshotIndex];
  viewer.innerHTML = `<img src="/api/screenshots/image/${item.id}" alt="Screenshot" />`;
  timeEl.textContent = `🕐 ${item.timestamp}  (${currentScreenshotIndex + 1}/${screenshotList.length})`;
}

function prevScreenshot() {
  if (screenshotList.length <= 1) return;
  currentScreenshotIndex = (currentScreenshotIndex + 1) % screenshotList.length;
  displayScreenshot();
}

// ============ App Usage ============
async function loadAppUsage(agent) {
  try {
    const data = await api(`/api/app_usage?agent=${encodeURIComponent(agent)}`);
    const tbody = document.getElementById('appUsageBody');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-muted)">暂无数据</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(d => `
      <tr>
        <td><strong>${escapeHtml(d.process_name)}</strong></td>
        <td>${d.total_minutes ?? 0}</td>
        <td>${d.switch_count ?? 0}</td>
        <td title="${escapeHtml(d.last_window_title || '')}">${escapeHtml((d.last_window_title || '').substring(0, 50))}</td>
      </tr>
    `).join('');
  } catch(e) { console.error('loadAppUsage', e); }
}

// ============ Browser History ============
async function loadBrowserHistory(agent) {
  try {
    const data = await api(`/api/browser_history?agent=${encodeURIComponent(agent)}&limit=100`);
    const tbody = document.getElementById('browserBody');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">暂无数据</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(d => {
      let tagClass = 'tag-chrome';
      if (d.browser === 'edge') tagClass = 'tag-edge';
      else if (d.browser === 'firefox') tagClass = 'tag-firefox';
      return `
        <tr>
          <td><span class="tag ${tagClass}">${escapeHtml(d.browser)}</span></td>
          <td title="${escapeHtml(d.title)}">${escapeHtml((d.title || '无标题').substring(0, 60))}</td>
          <td title="${escapeHtml(d.url)}"><a href="${escapeHtml(d.url)}" target="_blank" style="color:var(--accent);text-decoration:none">${escapeHtml(d.url.substring(0, 80))}</a></td>
          <td>${d.last_visit || '-'}</td>
          <td>${d.visit_count}</td>
        </tr>
      `;
    }).join('');
  } catch(e) { console.error('loadBrowserHistory', e); }
}

// ============ Utils ============
function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
