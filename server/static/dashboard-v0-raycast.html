<!DOCTYPE html>
<html lang="zh-CN" data-accent="coral" data-bg="charcoal">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor — Raycast Style v0</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================
   Design Tokens — Raycast
   ============================================ */
:root {
  --ground:    #0F0F11;
  --surface:   rgba(255,255,255,0.06);
  --surface-hover: rgba(255,255,255,0.10);
  --hairline:  rgba(255,255,255,0.10);
  --text:      #FFFFFF;
  --text-secondary: #B0B3B8;
  --muted:     #6B7280;
  --accent:    #FF6363;
  --green:     #4ADE80;
  --blue:      #60A5FA;
  --amber:     #FBBF24;
  --purple:    #A78BFA;
  --cyan:      #22D3EE;
  --font:      'Inter', -apple-system, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Consolas', monospace;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --shadow-card: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-lift: 0 16px 48px rgba(0,0,0,0.5);
}

/* Accent: Coral (default) */
[data-accent="coral"]   { --accent: #FF6363; }
/* Accent: Electric Blue */
[data-accent="blue"]    { --accent: #3B82F6; }
/* Accent: Amber */
[data-accent="amber"]   { --accent: #F59E0B; }
/* Accent: Violet */
[data-accent="violet"]  { --accent: #8B5CF6; }
/* Accent: Emerald */
[data-accent="emerald"] { --accent: #10B981; }
/* Accent: Cyan */
[data-accent="cyan"]    { --accent: #06B6D4; }

/* Background: Charcoal (default) */
[data-bg="charcoal"] {
  --ground: #0F0F11;
  --surface: rgba(255,255,255,0.06);
  --surface-hover: rgba(255,255,255,0.10);
  --hairline: rgba(255,255,255,0.10);
}
/* Background: Deep Navy */
[data-bg="navy"] {
  --ground: #0A0E1A;
  --surface: rgba(255,255,255,0.05);
  --surface-hover: rgba(255,255,255,0.09);
  --hairline: rgba(255,255,255,0.08);
}
/* Background: Pure Black */
[data-bg="black"] {
  --ground: #000000;
  --surface: rgba(255,255,255,0.06);
  --surface-hover: rgba(255,255,255,0.11);
  --hairline: rgba(255,255,255,0.10);
}
/* Background: Slate */
[data-bg="slate"] {
  --ground: #1E293B;
  --surface: rgba(255,255,255,0.07);
  --surface-hover: rgba(255,255,255,0.12);
  --hairline: rgba(255,255,255,0.10);
}
/* Background: Warm Dark */
[data-bg="warm"] {
  --ground: #171412;
  --surface: rgba(255,255,255,0.05);
  --surface-hover: rgba(255,255,255,0.09);
  --hairline: rgba(255,255,255,0.08);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  background: var(--ground);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background .4s ease;
}

/* ============================================
   Gradient Backdrop
   ============================================ */
.backdrop {
  position: fixed;
  top: -40%; left: -20%;
  width: 140%; height: 80%;
  background: radial-gradient(ellipse at 30% 50%, rgba(255,99,99,0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 30%, rgba(167,139,250,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 80%, rgba(96,165,250,0.05) 0%, transparent 50%);
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
  transition: background .6s ease;
}

/* ============================================
   Header
   ============================================ */
.header {
  position: sticky; top: 0; z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 24px;
  background: rgba(15,15,17,0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--hairline);
}
.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.logo {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo .icon {
  width: 24px; height: 24px;
  background: var(--accent);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  transition: background .3s;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-chip {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  border: 1px solid var(--hairline);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  background: var(--surface);
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.header-chip:hover {
  border-color: var(--accent);
  color: var(--text);
  background: var(--surface-hover);
}
.header-chip .shortcut {
  font-size: 9px;
  opacity: 0.5;
}
.header-chip.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(255,99,99,.1);
  transition: all .3s;
}

/* ============================================
   Agent Cards — horizontal scroll
   ============================================ */
.agent-strip {
  display: flex;
  gap: 10px;
  padding: 10px 24px 0;
  overflow-x: auto;
  position: relative;
  z-index: 1;
}
.agent-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all .2s cubic-bezier(0.22, 1, 0.36, 1);
  white-space: nowrap;
  flex-shrink: 0;
}
.agent-pill:hover {
  background: var(--surface-hover);
  transform: translateY(-2px);
  box-shadow: var(--shadow-card);
}
.agent-pill.active {
  border-color: var(--accent);
  background: rgba(255,99,99,.08);
  transition: all .3s;
}
.agent-pill .dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.agent-pill .dot.online  { background: var(--green); box-shadow: 0 0 6px rgba(74,222,128,.4); }
.agent-pill .dot.offline { background: var(--muted); }
.agent-pill .name {
  font-size: 12px;
  font-weight: 600;
}
.agent-pill .meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
}

/* ============================================
   Main Content — Cards Grid
   ============================================ */
.main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 12px;
  padding: 12px 24px 48px;
  position: relative;
  z-index: 1;
  height: calc(100vh - 100px);
}

/* ============================================
   Card — Glass Style
   ============================================ */
.card {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: var(--radius-lg);
  overflow: hidden;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  transition: all .25s cubic-bezier(0.22, 1, 0.36, 1);
  display: flex;
  flex-direction: column;
}
.card:hover {
  border-color: rgba(255,255,255,0.16);
  box-shadow: var(--shadow-card);
  transform: translateY(-1px);
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--hairline);
}
.card-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title .dot-indicator {
  width: 6px; height: 6px; border-radius: 50%;
}
.card-tabs {
  display: flex;
  gap: 4px;
}
.card-tab {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 6px;
  color: var(--muted);
  background: transparent;
  border: none;
  cursor: pointer;
  transition: all .15s;
}
.card-tab:hover { color: var(--text-secondary); background: var(--surface); }
.card-tab.active { color: var(--text); background: var(--surface-hover); }
.card-body {
  padding: 0;
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}

/* ============================================
   Screenshot Card
   ============================================ */
.screenshot-stage {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  min-height: 0;
  background: rgba(0,0,0,0.3);
  position: relative;
}
.screenshot-placeholder {
  text-align: center;
  color: var(--muted);
}
.screenshot-placeholder .icon-big {
  font-size: 40px;
  opacity: 0.15;
  display: block;
  margin-bottom: 8px;
}
.screenshot-nav {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
}
.screenshot-nav .nav-pill {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding: 4px 12px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--hairline);
  border-radius: 20px;
  color: var(--text-secondary);
  cursor: pointer;
  backdrop-filter: blur(8px);
  transition: all .15s;
}
.screenshot-nav .nav-pill:hover {
  background: rgba(255,255,255,0.14);
  color: var(--text);
  border-color: rgba(255,255,255,0.2);
}
.screenshot-time {
  position: absolute;
  top: 10px;
  right: 12px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--green);
  font-weight: 500;
  padding: 2px 8px;
  background: rgba(0,0,0,0.4);
  border-radius: 6px;
  backdrop-filter: blur(4px);
}
.monitor-chips {
  position: absolute;
  top: 10px;
  left: 12px;
  display: flex;
  gap: 4px;
}
.monitor-chip {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 20px;
  border: 1px solid var(--hairline);
  color: var(--muted);
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  cursor: pointer;
  transition: all .15s;
}
.monitor-chip:hover { border-color: var(--blue); color: var(--blue); }
.monitor-chip.active { border-color: var(--blue); color: var(--blue); background: rgba(96,165,250,.15); }

/* ============================================
   Timeline Card
   ============================================ */
.timeline-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 16px;
  border-bottom: 1px solid rgba(255,255,255,.02);
  transition: background .1s;
  font-size: 12px;
}
.timeline-row:hover { background: rgba(255,255,255,.03); }
.timeline-row .time {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  min-width: 44px;
  flex-shrink: 0;
}
.timeline-row .type-badge {
  font-size: 9px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 4px;
  min-width: 36px;
  text-align: center;
  flex-shrink: 0;
}
.timeline-row .type-badge.window { background: rgba(96,165,250,.12); color: var(--blue); }
.timeline-row .type-badge.chat   { background: rgba(167,139,250,.12); color: var(--purple); }
.timeline-row .app {
  color: var(--amber);
  font-family: var(--font-mono);
  font-size: 11px;
  max-width: 100px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex-shrink: 0;
}
.timeline-row .title {
  color: var(--text-secondary);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ============================================
   Browser History Card
   ============================================ */
.browser-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 5px 16px;
  border-bottom: 1px solid rgba(255,255,255,.02);
  font-size: 12px;
  transition: background .1s;
}
.browser-row:hover { background: rgba(255,255,255,.03); }
.browser-row .browser-icon {
  width: 16px; height: 16px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  font-weight: 700;
  flex-shrink: 0;
}
.browser-row .browser-icon.chrome { background: rgba(96,165,250,.15); color: var(--blue); }
.browser-row .browser-icon.edge   { background: rgba(96,165,250,.15); color: var(--blue); }
.browser-row .br-title {
  color: var(--text-secondary);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.browser-row .br-url {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  max-width: 180px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.browser-row .br-time {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  min-width: 44px;
  text-align: right;
}
.browser-row .br-count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--amber);
  min-width: 24px;
  text-align: right;
}

/* ============================================
   Log Card
   ============================================ */
.log-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 4px 16px;
  border-bottom: 1px solid rgba(255,255,255,.02);
  font-size: 12px;
  line-height: 1.5;
  transition: background .1s;
}
.log-row:hover { background: rgba(255,255,255,.03); }
.log-row .log-time {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  min-width: 44px;
  flex-shrink: 0;
}
.log-row .log-level {
  font-size: 9px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 4px;
  min-width: 36px;
  text-align: center;
  flex-shrink: 0;
}
.log-row .log-level.INFO    { background: rgba(251,191,36,.1); color: var(--amber); }
.log-row .log-level.WARNING { background: rgba(251,191,36,.18); color: #FCD34D; }
.log-row .log-level.ERROR   { background: rgba(255,99,99,.12); color: var(--accent); }
.log-row .log-cat {
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 4px;
  background: var(--surface);
  color: var(--muted);
  flex-shrink: 0;
}
.log-row .log-msg {
  color: var(--text-secondary);
  flex: 1;
  word-break: break-all;
  min-width: 0;
}

/* ============================================
   Stats Bar — bottom floating
   ============================================ */
.stats-bar {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 2px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--hairline);
  border-radius: var(--radius-xl);
  padding: 6px 8px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: var(--shadow-lift);
  z-index: 100;
}
.stats-bar .stat-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
  transition: all .15s;
  cursor: default;
}
.stats-bar .stat-pill:hover { background: var(--surface-hover); color: var(--text); }
.stats-bar .stat-pill .val {
  font-family: var(--font-mono);
  font-weight: 600;
  color: var(--text);
}
.stats-bar .stat-pill .dot-live {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ============================================
   Live Overlay — 70% viewport
   ============================================ */
.live-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s cubic-bezier(0.22, 1, 0.36, 1);
}
.live-overlay.open {
  opacity: 1;
  pointer-events: auto;
}
.live-box {
  width: 70vw;
  height: 70vh;
  background: var(--ground);
  border: 1px solid var(--hairline);
  border-radius: var(--radius-lg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  transform: scale(0.92);
  transition: transform .3s cubic-bezier(0.22, 1, 0.36, 1);
}
.live-overlay.open .live-box {
  transform: scale(1);
}
.live-box-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--hairline);
  flex-shrink: 0;
}
.live-box-title {
  font-size: 12px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.live-box-title .live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  animation: pulse 1.5s infinite;
}
.live-box-title .live-text {
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: .06em;
  font-size: 10px;
  font-weight: 700;
}
.live-box-title .agent-name {
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 11px;
}
.live-box-controls {
  display: flex;
  gap: 8px;
  align-items: center;
}
.live-box-controls .live-btn {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding: 4px 12px;
  border: 1px solid var(--hairline);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all .15s;
}
.live-box-controls .live-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(255,99,99,.08);
}
.live-box-controls .live-btn.close-btn:hover {
  border-color: var(--text-secondary);
  color: var(--text);
}
.live-box-body {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.3);
  position: relative;
}
.live-box-body .live-placeholder {
  text-align: center;
  color: var(--muted);
}
.live-box-body .live-placeholder .big {
  font-size: 64px;
  opacity: 0.1;
  display: block;
  margin-bottom: 12px;
}
.live-box-timestamp {
  position: absolute;
  top: 12px;
  right: 16px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--green);
  font-weight: 500;
  padding: 3px 10px;
  background: rgba(0,0,0,0.5);
  border-radius: 6px;
}
.live-box-monitor {
  position: absolute;
  top: 12px;
  left: 16px;
  display: flex;
  gap: 6px;
}
.live-box-monitor .mon-chip {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--hairline);
  color: var(--muted);
  background: rgba(0,0,0,0.5);
  cursor: pointer;
  transition: all .15s;
}
.live-box-monitor .mon-chip:hover { border-color: var(--blue); color: var(--blue); }
.live-box-monitor .mon-chip.active { border-color: var(--blue); color: var(--blue); background: rgba(96,165,250,.15); }
.live-box-nav {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
}
.live-box-nav .nav-pill {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  padding: 6px 18px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--hairline);
  border-radius: 20px;
  color: var(--text-secondary);
  cursor: pointer;
  backdrop-filter: blur(8px);
  transition: all .15s;
}
.live-box-nav .nav-pill:hover {
  background: rgba(255,255,255,0.14);
  color: var(--text);
  border-color: rgba(255,255,255,0.2);
}
.expand-btn {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding: 3px 10px;
  border: 1px solid var(--hairline);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.expand-btn:hover {
  border-color: var(--blue);
  color: var(--blue);
  background: rgba(96,165,250,.08);
}

/* ============================================
   Theme Picker
   ============================================ */
.theme-picker {
  position: fixed;
  bottom: 52px;
  right: 20px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}
.theme-toggle {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--hairline);
  background: var(--surface);
  backdrop-filter: blur(12px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all .2s;
  box-shadow: var(--shadow-card);
}
.theme-toggle:hover {
  border-color: var(--accent);
  transform: scale(1.1);
}
.theme-panel {
  background: rgba(15,15,17,0.92);
  border: 1px solid var(--hairline);
  border-radius: var(--radius-md);
  padding: 12px;
  backdrop-filter: blur(20px);
  box-shadow: var(--shadow-lift);
  display: none;
  flex-direction: column;
  gap: 6px;
  min-width: 140px;
}
.theme-panel.open { display: flex; }
.theme-panel-label {
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  margin-bottom: 4px;
}
.accent-option, .bg-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: background .1s;
  font-size: 11px;
  color: var(--text-secondary);
  border: none;
  background: transparent;
  font-family: inherit;
  width: 100%;
  text-align: left;
}
.accent-option:hover, .bg-option:hover { background: var(--surface-hover); }
.accent-option.active, .bg-option.active { background: var(--surface-hover); color: var(--text); }
.theme-swatch {
  width: 14px; height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 2px solid transparent;
  transition: border-color .15s;
}
.accent-option.active .theme-swatch, .bg-option.active .theme-swatch { border-color: var(--text); }
.theme-name { flex: 1; }

/* ============================================
   Scrollbar
   ============================================ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.2); }
</style>
</head>
<body>

<!-- Gradient Backdrop -->
<div class="backdrop"></div>

<!-- ====== Header ====== -->
<div class="header">
  <div class="header-left">
    <div class="logo">
      <div class="icon">M</div>
      Monitor
    </div>
  </div>
  <div class="header-right">
    <button class="header-chip active">
      <span class="dot-live" style="width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite"></span>
      实时模式
      <span class="shortcut">⌘L</span>
    </button>
    <button class="header-chip">网格视图 <span class="shortcut">⌘G</span></button>
    <button class="header-chip">刷新 <span class="shortcut">⌘R</span></button>
  </div>
</div>

<!-- ====== Agent Strip ====== -->
<div class="agent-strip" id="agentStrip">
  <div class="agent-pill" style="opacity:0.5"><span class="name">加载中...</span></div>
</div>

<!-- ====== Main Grid ====== -->
<div class="main">

  <!-- Card 1: Screenshot -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">
        <span class="dot-indicator" style="background:var(--blue)"></span>
        截图
      </span>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="expand-btn" onclick="openLive()">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="4,1 1,1 1,4"/><line x1="1" y1="1" x2="6" y2="6"/><polyline points="12,15 15,15 15,12"/><line x1="15" y1="15" x2="10" y2="10"/></svg>
          放大
        </button>
        <div class="card-tabs">
          <button class="card-tab active">实时</button>
          <button class="card-tab">历史</button>
          <button class="card-tab">网格</button>
        </div>
      </div>
    </div>
    <div class="card-body">
      <div class="screenshot-stage" id="screenshotStage">
        <div class="screenshot-placeholder" id="screenshotPlaceholder">
          <span class="icon-big">[ ]</span>
          选择被控端查看截图
        </div>
        <div class="monitor-chips" id="monitorChips" style="display:none"></div>
        <span class="screenshot-time" id="screenshotTime"></span>
        <div class="screenshot-nav">
          <button class="nav-pill" onclick="prevScreenshot()">◀ 上一张</button>
          <button class="nav-pill" onclick="nextScreenshot()">下一张 ▶</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Card 2: Timeline -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">
        <span class="dot-indicator" style="background:var(--purple)"></span>
        活动记录
      </span>
      <div class="card-tabs">
        <button class="card-tab active">全部</button>
        <button class="card-tab">窗口</button>
        <button class="card-tab">聊天</button>
      </div>
    </div>
    <div class="card-body" id="timelineBody">
      <div style="padding:20px;text-align:center;color:var(--muted)">选择被控端查看活动</div>
    </div>
  </div>

  <!-- Card 3: Browser History -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">
        <span class="dot-indicator" style="background:var(--amber)"></span>
        浏览器历史
      </span>
      <div class="card-tabs">
        <button class="card-tab active">全部</button>
        <button class="card-tab">Chrome</button>
        <button class="card-tab">Edge</button>
      </div>
    </div>
    <div class="card-body" id="browserBody">
      <div style="padding:20px;text-align:center;color:var(--muted)">选择被控端查看浏览器历史</div>
    </div>
  </div>

  <!-- Card 4: System Log -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">
        <span class="dot-indicator" style="background:var(--accent)"></span>
        系统日志
      </span>
      <div class="card-tabs">
        <button class="card-tab active">全部</button>
        <button class="card-tab">信息</button>
        <button class="card-tab">警告</button>
        <button class="card-tab">错误</button>
      </div>
    </div>
    <div class="card-body" id="logBody">
      <div style="padding:20px;text-align:center;color:var(--muted)">加载中...</div>
    </div>
  </div>

</div>

<!-- ====== Theme Picker ====== -->
<div class="theme-picker">
  <div class="theme-panel" id="themePanel">
    <span class="theme-panel-label">强调色</span>
    <button class="accent-option active" data-val="coral" onclick="setAccent('coral')">
      <span class="theme-swatch" style="background:#FF6363"></span>
      <span class="theme-name">Coral</span>
    </button>
    <button class="accent-option" data-val="blue" onclick="setAccent('blue')">
      <span class="theme-swatch" style="background:#3B82F6"></span>
      <span class="theme-name">Electric Blue</span>
    </button>
    <button class="accent-option" data-val="amber" onclick="setAccent('amber')">
      <span class="theme-swatch" style="background:#F59E0B"></span>
      <span class="theme-name">Amber</span>
    </button>
    <button class="accent-option" data-val="violet" onclick="setAccent('violet')">
      <span class="theme-swatch" style="background:#8B5CF6"></span>
      <span class="theme-name">Violet</span>
    </button>
    <button class="accent-option" data-val="emerald" onclick="setAccent('emerald')">
      <span class="theme-swatch" style="background:#10B981"></span>
      <span class="theme-name">Emerald</span>
    </button>
    <button class="accent-option" data-val="cyan" onclick="setAccent('cyan')">
      <span class="theme-swatch" style="background:#06B6D4"></span>
      <span class="theme-name">Cyan</span>
    </button>
    <div style="border-top:1px solid var(--hairline);margin:6px 0"></div>
    <span class="theme-panel-label">背景色</span>
    <button class="bg-option active" data-val="charcoal" onclick="setBg('charcoal')">
      <span class="theme-swatch" style="background:#0F0F11"></span>
      <span class="theme-name">Charcoal</span>
    </button>
    <button class="bg-option" data-val="navy" onclick="setBg('navy')">
      <span class="theme-swatch" style="background:#0A0E1A"></span>
      <span class="theme-name">Deep Navy</span>
    </button>
    <button class="bg-option" data-val="black" onclick="setBg('black')">
      <span class="theme-swatch" style="background:#000000"></span>
      <span class="theme-name">Pure Black</span>
    </button>
    <button class="bg-option" data-val="slate" onclick="setBg('slate')">
      <span class="theme-swatch" style="background:#1E293B"></span>
      <span class="theme-name">Slate</span>
    </button>
    <button class="bg-option" data-val="warm" onclick="setBg('warm')">
      <span class="theme-swatch" style="background:#171412"></span>
      <span class="theme-name">Warm Dark</span>
    </button>
  </div>
  <button class="theme-toggle" onclick="toggleThemePanel()" title="配色方案">🎨</button>
</div>

<!-- ====== Floating Stats Bar ====== -->
<div class="stats-bar">
  <div class="stat-pill">
    <span class="dot-live"></span>
    在线 <span class="val" id="statOnline">0</span>
  </div>
  <div class="stat-pill">截图 <span class="val" id="statScreenshots">0</span></div>
  <div class="stat-pill">事件 <span class="val" id="statEvents">0</span></div>
  <div class="stat-pill">网址 <span class="val" id="statBrowser">0</span></div>
</div>

<!-- ====== Live Overlay ====== -->
<div class="live-overlay" id="liveOverlay" onclick="if(event.target===this)closeLive()">
  <div class="live-box">
    <div class="live-box-header">
      <span class="live-box-title">
        <span class="live-dot"></span>
        <span class="live-text">Live</span>
        <span class="agent-name" id="liveAgentName">-</span>
      </span>
      <div class="live-box-controls">
        <button class="live-btn close-btn" onclick="closeLive()">
          <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/></svg>
          关闭
        </button>
      </div>
    </div>
    <div class="live-box-body" id="liveBoxBody">
      <div class="live-placeholder" id="livePlaceholder">
        <span class="big">[ ]</span>
        实时截图画面
      </div>
      <div class="live-box-monitor" id="liveMonitorChips" style="display:none"></div>
      <span class="live-box-timestamp" id="liveTimestamp"></span>
      <div class="live-box-nav">
        <button class="nav-pill" onclick="prevScreenshot()">◀ 上一张</button>
        <button class="nav-pill" onclick="nextScreenshot()">下一张 ▶</button>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================
// State
// ============================================
let selectedAgent = null;
let selectedMonitor = null;
let monitorTotal = 1;
let liveMode = true;
let refreshTimer = null;
let screenshotList = [];
let currentScreenshotIndex = 0;

// ============================================
// API Helper
// ============================================
async function api(path) {
  const resp = await fetch(path);
  if (!resp.ok) throw new Error(`${resp.status}`);
  return resp.json();
}

// ============================================
// Agent List
// ============================================
async function loadAgents() {
  try {
    const agents = await api('/api/agents');
    const strip = document.getElementById('agentStrip');
    if (!agents.length) {
      strip.innerHTML = '<div class="agent-pill" style="opacity:0.5"><span class="name">暂无被控端</span></div>';
      return;
    }
    strip.innerHTML = agents.map(a => {
      const isOnline = a.status === 'online';
      const interval = a.screenshot_interval ? a.screenshot_interval + 's' : (isOnline ? '在线' : '离线');
      return `<div class="agent-pill${a.name === selectedAgent ? ' active' : ''}" data-agent="${a.name}" onclick="selectAgent('${a.name}')">
        <span class="dot ${isOnline ? 'online' : 'offline'}"></span>
        <span class="name">${a.name}</span>
        <span class="meta">${interval}</span>
      </div>`;
    }).join('');
    // Auto-select first agent if none selected
    if (!selectedAgent && agents.length) {
      selectAgent(agents[0].name);
    }
  } catch(e) {
    console.error('loadAgents failed:', e);
  }
}

function selectAgent(name) {
  selectedAgent = name;
  selectedMonitor = null;
  document.querySelectorAll('.agent-pill').forEach(el => {
    el.classList.toggle('active', el.dataset.agent === name);
  });
  document.getElementById('liveAgentName').textContent = name;
  refreshAll();
  startAutoRefresh();
}

// ============================================
// Screenshots
// ============================================
async function loadLatestScreenshot() {
  if (!selectedAgent) return;
  try {
    let url = `/api/screenshots/latest?agent=${encodeURIComponent(selectedAgent)}`;
    if (selectedMonitor !== null) url += `&monitor=${selectedMonitor}`;
    const data = await api(url);
    if (!data.id) return;
    const src = `/api/screenshots/image/${data.id}`;
    monitorTotal = data.monitor_total || 1;

    // Update card screenshot
    const stage = document.getElementById('screenshotStage');
    const placeholder = document.getElementById('screenshotPlaceholder');
    if (placeholder) placeholder.style.display = 'none';
    let img = stage.querySelector('img.screenshot-img');
    if (!img) {
      img = document.createElement('img');
      img.className = 'screenshot-img';
      img.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;position:absolute;inset:0;margin:auto;';
      stage.insertBefore(img, stage.firstChild);
    }
    img.src = src;

    // Update time
    document.getElementById('screenshotTime').textContent = '实时 ' + new Date(data.timestamp).toTimeString().slice(0, 8);

    // Update monitor chips
    updateMonitorChips(monitorTotal);

    // Update live overlay
    const liveBody = document.getElementById('liveBoxBody');
    const livePh = document.getElementById('livePlaceholder');
    if (livePh) livePh.style.display = 'none';
    let liveImg = liveBody.querySelector('img.live-img');
    if (!liveImg) {
      liveImg = document.createElement('img');
      liveImg.className = 'live-img';
      liveImg.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;position:absolute;inset:0;margin:auto;';
      liveBody.insertBefore(liveImg, liveBody.firstChild);
    }
    liveImg.src = src;
    document.getElementById('liveTimestamp').textContent = 'Live ' + new Date(data.timestamp).toTimeString().slice(0, 8);

  } catch(e) { /* keep existing image */ }
}

function updateMonitorChips(total) {
  monitorTotal = total || 1;
  // Card chips
  const chips = document.getElementById('monitorChips');
  if (monitorTotal <= 1) { chips.style.display = 'none'; return; }
  chips.style.display = 'flex';
  chips.innerHTML = `<span class="monitor-chip${selectedMonitor === null ? ' active' : ''}" onclick="selectMonitor(null)">全部</span>` +
    Array.from({length: monitorTotal}, (_, i) =>
      `<span class="monitor-chip${selectedMonitor === i ? ' active' : ''}" onclick="selectMonitor(${i})">屏${i+1}</span>`
    ).join('');
  // Live chips
  const liveChips = document.getElementById('liveMonitorChips');
  liveChips.style.display = 'flex';
  liveChips.innerHTML = chips.innerHTML;
}

function selectMonitor(idx) {
  selectedMonitor = idx;
  updateMonitorChips(monitorTotal);
  loadLatestScreenshot();
}

function prevScreenshot() {
  // In live mode, switch to history
  if (liveMode) { liveMode = false; loadHistoryScreenshots(); }
  else if (currentScreenshotIndex > 0) {
    currentScreenshotIndex--;
    displayHistoryScreenshot();
  }
}

function nextScreenshot() {
  if (!liveMode && currentScreenshotIndex < screenshotList.length - 1) {
    currentScreenshotIndex++;
    displayHistoryScreenshot();
  }
}

async function loadHistoryScreenshots() {
  if (!selectedAgent) return;
  try {
    let url = `/api/screenshots?agent=${encodeURIComponent(selectedAgent)}&limit=50`;
    if (selectedMonitor !== null) url += `&monitor=${selectedMonitor}`;
    screenshotList = await api(url);
    currentScreenshotIndex = 0;
    if (screenshotList.length) displayHistoryScreenshot();
  } catch(e) { console.error('loadHistoryScreenshots:', e); }
}

function displayHistoryScreenshot() {
  if (!screenshotList.length) return;
  const item = screenshotList[currentScreenshotIndex];
  const src = `/api/screenshots/image/${item.id}`;
  const stage = document.getElementById('screenshotStage');
  const placeholder = document.getElementById('screenshotPlaceholder');
  if (placeholder) placeholder.style.display = 'none';
  let img = stage.querySelector('img.screenshot-img');
  if (!img) {
    img = document.createElement('img');
    img.className = 'screenshot-img';
    img.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;position:absolute;inset:0;margin:auto;';
    stage.insertBefore(img, stage.firstChild);
  }
  img.src = src;
  document.getElementById('screenshotTime').textContent =
    `${item.timestamp}  (${currentScreenshotIndex+1}/${screenshotList.length})`;
}

// ============================================
// Timeline
// ============================================
async function loadTimeline() {
  if (!selectedAgent) return;
  try {
    const events = await api(`/api/app_events?agent=${encodeURIComponent(selectedAgent)}&limit=20&with_screenshots=true`);
    const body = document.getElementById('timelineBody');
    if (!events.length) {
      body.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted)">暂无活动记录</div>';
      return;
    }
    body.innerHTML = events.map(e => {
      const t = new Date(e.timestamp);
      const time = t.toTimeString().slice(0, 5);
      const isChat = e.event_type === 'chat_enter';
      const badge = isChat ? '<span class="type-badge chat">聊天</span>' : '<span class="type-badge window">窗口</span>';
      const proc = e.process_name || '';
      const title = isChat ? (e.display_name ? `[${e.display_name} Enter]` : '[Enter 发送]') : (e.window_title || '');
      return `<div class="timeline-row">
        <span class="time">${time}</span>
        ${badge}
        <span class="app">${proc}</span>
        <span class="title">${title}</span>
      </div>`;
    }).join('');
  } catch(e) { console.error('loadTimeline:', e); }
}

// ============================================
// Browser History
// ============================================
async function loadBrowserHistory() {
  if (!selectedAgent) return;
  try {
    const records = await api(`/api/browser_history?agent=${encodeURIComponent(selectedAgent)}&limit=20&with_screenshots=true`);
    const body = document.getElementById('browserBody');
    if (!records.length) {
      body.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted)">暂无浏览器历史</div>';
      return;
    }
    body.innerHTML = records.map(r => {
      const t = new Date(r.last_visit);
      const time = t.toTimeString().slice(0, 5);
      const browser = (r.browser || 'unknown').toLowerCase();
      const icon = browser.includes('edge') ? 'E' : 'C';
      const iconClass = browser.includes('edge') ? 'edge' : 'chrome';
      const url = r.url || '';
      const shortUrl = url.length > 40 ? url.slice(0, 40) + '...' : url;
      return `<div class="browser-row">
        <span class="browser-icon ${iconClass}">${icon}</span>
        <span class="br-title">${r.title || '(无标题)'}</span>
        <span class="br-url">${shortUrl}</span>
        <span class="br-time">${time}</span>
        <span class="br-count">${r.visit_count || 1}</span>
      </div>`;
    }).join('');
  } catch(e) { console.error('loadBrowserHistory:', e); }
}

// ============================================
// System Logs
// ============================================
async function loadLogs() {
  try {
    const logs = await api('/api/logs?limit=20');
    const body = document.getElementById('logBody');
    if (!logs.length) {
      body.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted)">暂无日志</div>';
      return;
    }
    body.innerHTML = logs.map(l => {
      const t = new Date(l.timestamp);
      const time = t.toTimeString().slice(0, 5);
      const levelMap = {INFO: '信息', WARNING: '警告', ERROR: '错误'};
      const catMap = {network: '网络', storage: '存储', capture: '采集', system: '系统', security: '安全', server: '服务'};
      return `<div class="log-row">
        <span class="log-time">${time}</span>
        <span class="log-level ${l.level}">${levelMap[l.level] || l.level}</span>
        <span class="log-cat">${catMap[l.category] || l.category}</span>
        <span class="log-msg">${l.message}</span>
      </div>`;
    }).join('');
  } catch(e) { console.error('loadLogs:', e); }
}

// ============================================
// Stats
// ============================================
async function loadStats() {
  try {
    const stats = await api(`/api/dashboard/stats${selectedAgent ? '?agent=' + encodeURIComponent(selectedAgent) : ''}`);
    document.getElementById('statOnline').textContent = stats.online_agents || 0;
    document.getElementById('statScreenshots').textContent = (stats.total_screenshots || 0).toLocaleString();
    document.getElementById('statEvents').textContent = (stats.today_app_events || 0).toLocaleString();
    document.getElementById('statBrowser').textContent = (stats.total_browser_records || 0).toLocaleString();
  } catch(e) { console.error('loadStats:', e); }
}

// ============================================
// Viewer Heartbeat
// ============================================
function startHeartbeat() {
  setInterval(() => {
    fetch('/api/viewer/heartbeat', { method: 'POST' }).catch(() => {});
  }, 1000);
}

// ============================================
// Auto Refresh
// ============================================
function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(() => {
    if (liveMode) loadLatestScreenshot();
  }, 1000);
  // Slower refreshes
  setInterval(() => { loadTimeline(); loadBrowserHistory(); loadLogs(); loadStats(); }, 5000);
}

function refreshAll() {
  loadLatestScreenshot();
  loadTimeline();
  loadBrowserHistory();
  loadLogs();
  loadStats();
}

// ============================================
// Live Overlay
// ============================================
function openLive() {
  document.getElementById('liveOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLive() {
  document.getElementById('liveOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ============================================
// Theme Picker
// ============================================
function toggleThemePanel() {
  document.getElementById('themePanel').classList.toggle('open');
}
function closeThemePanel() {
  document.getElementById('themePanel').classList.remove('open');
}
function setAccent(name) {
  document.documentElement.setAttribute('data-accent', name);
  document.querySelectorAll('.accent-option').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.val === name);
  });
  updateBackdrop(name);
}
function setBg(name) {
  document.documentElement.setAttribute('data-bg', name);
  document.querySelectorAll('.bg-option').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.val === name);
  });
}
function updateBackdrop(accent) {
  const colors = {
    coral:   ['rgba(255,99,99,0.08)',  'rgba(167,139,250,0.06)', 'rgba(96,165,250,0.05)'],
    blue:    ['rgba(59,130,246,0.08)',  'rgba(96,165,250,0.06)', 'rgba(34,211,238,0.05)'],
    amber:   ['rgba(245,158,11,0.08)', 'rgba(251,191,36,0.06)', 'rgba(255,99,99,0.05)'],
    violet:  ['rgba(139,92,246,0.08)', 'rgba(167,139,250,0.06)', 'rgba(236,72,153,0.05)'],
    emerald: ['rgba(16,185,129,0.08)', 'rgba(74,222,128,0.06)', 'rgba(34,211,238,0.05)'],
    cyan:    ['rgba(6,182,212,0.08)',  'rgba(34,211,238,0.06)', 'rgba(96,165,250,0.05)'],
  };
  const c = colors[accent] || colors.coral;
  document.querySelector('.backdrop').style.background =
    `radial-gradient(ellipse at 30% 50%, ${c[0]} 0%, transparent 50%),
     radial-gradient(ellipse at 70% 30%, ${c[1]} 0%, transparent 50%),
     radial-gradient(ellipse at 50% 80%, ${c[2]} 0%, transparent 50%)`;
}

// ============================================
// Keyboard Shortcuts
// ============================================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeLive(); closeThemePanel(); }
  if (e.key === 'l' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); liveMode = !liveMode; if (liveMode) loadLatestScreenshot(); else loadHistoryScreenshots(); }
  if (e.key === 'g' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); /* grid mode placeholder */ }
  if (e.key === 'r' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); refreshAll(); }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.theme-picker')) closeThemePanel();
});

// ============================================
// Init
// ============================================
document.addEventListener('DOMContentLoaded', () => {
  loadAgents();
  startHeartbeat();
  startAutoRefresh();
  loadLogs();
  loadStats();
});
</script>

</body>
</html>
